name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check README.md exists and is not empty
        run: |
          if [ ! -s README.md ]; then
            echo "README.md is missing or empty"
            exit 1
          fi
          echo "README.md looks good"
